<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>项目工作台</title>
    <style>
        :root{color-scheme:dark;--bg:#0d0f14;--panel:#151821;--panel2:#1b1f2a;--line:#2a303d;--text:#f3f5f8;--muted:#929bab;--accent:#8b5cf6;--green:#49d17d;--red:#ff6b78;--amber:#f5b84b}
        *{box-sizing:border-box} body{margin:0;background:radial-gradient(circle at 55% -20%,#242137 0,transparent 36%),var(--bg);color:var(--text);font:14px/1.5 Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif}
        button,select,input{font:inherit} button{cursor:pointer}.shell{min-height:100vh}.topbar{height:64px;padding:0 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--line);background:rgba(13,15,20,.86);backdrop-filter:blur(18px);position:sticky;top:0;z-index:10}
        .brand,.top-actions,.project-tools,.section-head,.task-head,.asset-meta,.dialog-actions{display:flex;align-items:center}.brand{gap:12px}.brand-mark{width:34px;height:34px;border-radius:9px;display:block;object-fit:cover}.brand strong{display:block;font-size:15px}.brand small{display:block;color:var(--muted);font-size:11px}.top-actions{gap:8px}
        button,.button-link,select,input{border:1px solid var(--line);background:#1a1e28;color:var(--text);border-radius:10px;min-height:36px;padding:0 12px}.button-link{display:inline-flex;align-items:center;text-decoration:none}.primary{background:#f2f3f5;color:#101217;border-color:#f2f3f5;font-weight:800}.icon-btn{width:36px;padding:0;display:grid;place-items:center}.main{max-width:1500px;margin:0 auto;padding:28px 24px 56px}
        .hero{display:flex;justify-content:space-between;gap:24px;align-items:flex-end;margin-bottom:20px}.eyebrow{color:#a78bfa;font-size:11px;font-weight:800;letter-spacing:.14em;text-transform:uppercase}.hero h1{font-size:30px;line-height:1.15;margin:6px 0}.hero p{margin:0;color:var(--muted)}.project-tools{gap:8px;flex-wrap:wrap}.project-tools select{min-width:190px}
        .stats{display:grid;grid-template-columns:repeat(8,minmax(0,1fr));gap:10px;margin-bottom:22px}.stat{padding:16px;border:1px solid var(--line);border-radius:14px;background:linear-gradient(145deg,rgba(31,35,47,.92),rgba(20,23,31,.92))}.stat strong{display:block;font-size:24px;line-height:1}.stat span{display:block;margin-top:8px;color:var(--muted);font-size:11px}.stat.active strong{color:#a78bfa}.stat.success strong{color:var(--green)}.stat.attention strong{color:var(--red)}
        .layout{display:grid;grid-template-columns:minmax(0,1.65fr) minmax(300px,.75fr);gap:18px}.panel{border:1px solid var(--line);background:rgba(21,24,33,.94);border-radius:16px;padding:18px;min-width:0}.section-head{justify-content:space-between;gap:12px;margin-bottom:14px}.section-head h2{font-size:14px;margin:0}.section-head span{color:var(--muted);font-size:11px}.canvas-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}
        .canvas-card{min-height:148px;padding:14px;text-align:left;border-radius:14px;background:#1a1e28;border:1px solid var(--line);transition:.16s ease}.canvas-card:hover,.asset-card:hover{transform:translateY(-2px);border-color:#50586b}.canvas-icon{width:38px;height:38px;border-radius:12px;display:grid;place-items:center;background:#282d3b;font-size:18px}.canvas-kind{display:inline-flex;margin-top:14px;padding:2px 7px;border-radius:999px;background:#282d3b;color:#b8c0cf;font-size:9px;font-weight:800}.canvas-card h3{font-size:13px;margin:8px 0 3px}.canvas-card p{color:var(--muted);font-size:10px;margin:0}.canvas-metrics{display:flex;gap:10px;margin-top:10px;color:#b7bfcc;font-size:10px}
        .tasks{display:flex;flex-direction:column;gap:8px;max-height:525px;overflow:auto}.task{padding:12px;border:1px solid var(--line);border-radius:12px;background:#191d27}.task-head{justify-content:space-between;gap:8px}.status{padding:2px 7px;border-radius:999px;font-size:9px;font-weight:800;background:#303544;color:#cbd2df}.status.succeeded{background:rgba(73,209,125,.12);color:var(--green)}.status.failed,.status.cancelled{background:rgba(255,107,120,.12);color:var(--red)}.status.running,.status.queued{background:rgba(139,92,246,.14);color:#b89aff}.task time{font-size:9px;color:var(--muted)}.task p{font-size:11px;margin:8px 0 6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}.task small{color:var(--muted);font-size:9px}.task button{margin-top:9px;min-height:28px;font-size:10px;padding:0 9px}
        .assets-panel{grid-column:1/-1}.asset-grid{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:10px}.asset-card{border:1px solid var(--line);border-radius:13px;overflow:hidden;background:#191d27;text-align:left;padding:0;color:var(--text);transition:.16s ease}.asset-thumb{aspect-ratio:1.2;background:#101218;display:grid;place-items:center;overflow:hidden}.asset-thumb img{width:100%;height:100%;object-fit:cover}.asset-file{font-size:16px;font-weight:900;letter-spacing:.12em;color:#a78bfa}.asset-copy{padding:10px}.asset-copy strong{display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:11px}.asset-meta{justify-content:space-between;color:var(--muted);font-size:9px;margin-top:5px}
        .preference-panel{grid-column:1/-1}.preference-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.preference-card{padding:14px;border:1px solid var(--line);border-radius:12px;background:#191d27}.preference-card h3{font-size:12px;margin:0 0 8px}.preference-card p{color:var(--muted);font-size:10px;margin:5px 0}.preference-tags{display:flex;gap:6px;flex-wrap:wrap}.preference-tags span{padding:3px 8px;border-radius:999px;background:#282d3b;color:#cbd2df;font-size:9px}.candidate-actions{display:flex;gap:6px;margin-top:10px}.candidate-actions button{min-height:28px;font-size:10px}
        .quality-panel{grid-column:1/-1}.quality-summary{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}.quality-metric{padding:14px;border:1px solid var(--line);border-radius:12px;background:#191d27}.quality-metric strong{display:block;font-size:20px}.quality-metric span{display:block;margin-top:5px;color:var(--muted);font-size:10px}.quality-chip{display:inline-flex;margin:8px 6px 0 0;padding:3px 8px;border-radius:999px;font-size:9px;font-weight:800}.quality-chip.passed{background:rgba(73,209,125,.12);color:var(--green)}.quality-chip.failed,.quality-chip.error{background:rgba(255,107,120,.12);color:var(--red)}.replay-dialog{width:min(920px,calc(100vw - 32px))}.replay-attempt{padding:14px;border:1px solid var(--line);border-radius:13px;background:#12151d;margin-top:10px}.replay-attempt h3{font-size:12px;margin:0}.replay-attempt>p{margin:8px 0;color:#d7dce5;font-size:11px}.replay-score{display:grid;grid-template-columns:52px 1fr;gap:8px;padding:8px;border-radius:9px;background:#202532;margin-top:6px;font-size:10px}.replay-score strong{color:#fff}.replay-score span{color:var(--muted)}
        .context-panel{grid-column:1/-1}.context-grid{display:grid;grid-template-columns:1.25fr .75fr;gap:12px}.context-card{padding:14px;border:1px solid var(--line);border-radius:12px;background:#191d27}.context-card h3{font-size:12px;margin:0 0 8px}.context-card p{color:var(--muted);font-size:10px;margin:5px 0}.constraint-list{display:flex;flex-direction:column;gap:6px}.constraint{display:grid;grid-template-columns:64px 1fr;gap:8px;padding:8px;border-radius:9px;background:#222734;font-size:10px}.constraint em{font-style:normal;color:#b89aff}.constraint.negative em{color:var(--red)}.context-sources{display:flex;gap:6px;flex-wrap:wrap}.context-sources span{padding:4px 8px;border-radius:999px;background:#282d3b;color:#cbd2df;font-size:9px}.context-references{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:6px;margin-top:10px}.context-references img{width:100%;aspect-ratio:1.2;object-fit:cover;border-radius:8px;background:#101218}
        .empty{grid-column:1/-1;padding:42px 18px;border:1px dashed #343a48;border-radius:12px;color:var(--muted);text-align:center}.loading{opacity:.55;pointer-events:none}
        dialog{width:min(480px,calc(100vw - 32px));border:1px solid var(--line);border-radius:16px;background:#171b24;color:var(--text);padding:0;box-shadow:0 28px 90px rgba(0,0,0,.58)}dialog::backdrop{background:rgba(5,7,10,.74);backdrop-filter:blur(4px)}.dialog-body{padding:20px}.dialog-body h2{margin:0 0 4px;font-size:16px}.dialog-body p{color:var(--muted);margin:0 0 16px;font-size:11px}.dialog-body label{display:block;color:#c8cfda;font-size:10px;font-weight:700;margin:12px 0 5px}.dialog-body input,.dialog-body select{width:100%}.dialog-actions{justify-content:flex-end;gap:8px;margin-top:18px}
        .lineage-dialog{width:min(850px,calc(100vw - 32px))}.lineage-preview{display:grid;grid-template-columns:220px 1fr;gap:18px}.lineage-preview>img{width:220px;aspect-ratio:1;border-radius:13px;object-fit:cover;background:#0e1016}.lineage-columns{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}.lineage-column{padding:12px;border:1px solid var(--line);border-radius:12px;background:#12151d;min-width:0}.lineage-column h3{margin:0 0 10px;font-size:11px}.lineage-node{padding:8px;border-radius:9px;background:#202532;margin-top:6px;font-size:10px;overflow:hidden;text-overflow:ellipsis}.lineage-current{outline:1px solid var(--accent)}
        @media(max-width:1050px){.stats{grid-template-columns:repeat(3,1fr)}.layout{grid-template-columns:1fr}.asset-grid{grid-template-columns:repeat(4,1fr)}}@media(max-width:700px){.topbar{padding:0 14px}.main{padding:20px 14px}.hero{align-items:flex-start;flex-direction:column}.canvas-grid{grid-template-columns:repeat(2,1fr)}.asset-grid{grid-template-columns:repeat(2,1fr)}.preference-grid,.quality-summary,.context-grid{grid-template-columns:1fr}.stats{grid-template-columns:repeat(2,1fr)}.lineage-preview{grid-template-columns:1fr}.lineage-preview>img{width:100%}.lineage-columns{grid-template-columns:1fr}.brand small,.button-label{display:none}}
    </style>
    <script src="/static/vendor/lucide.min.js"></script>
    <link rel="stylesheet" href="/static/studio-shell.css?v=20260720-unified-shell">
    <script defer src="/static/studio-shell.js?v=20260720-unified-shell"></script>
</head>
<body>
<div class="shell">
    <header class="topbar">
        <div class="brand"><img class="brand-mark" src="/static/logo.png" alt=""><div><strong>项目管理</strong><small>画布、任务、资产与生成血缘</small></div></div>
        <div class="top-actions">
            <button id="refreshBtn" class="icon-btn" type="button" title="刷新" aria-label="刷新"><i data-lucide="refresh-cw"></i></button>
        </div>
    </header>
    <main id="main" class="main">
        <section class="hero">
            <div><div class="eyebrow">Project command center</div><h1 id="projectName">正在加载项目…</h1><p id="projectMeta">汇总画布、任务、资产版本与生成血缘</p></div>
            <div class="project-tools">
                <select id="projectSelect" aria-label="当前项目"></select>
                <button id="pptWorkbenchBtn" type="button">建筑强排 PPT</button>
                <button id="newProjectBtn" type="button">＋ 新建项目</button>
                <button id="newCanvasBtn" class="primary" type="button">＋ 新建画布</button>
            </div>
        </section>
        <section id="stats" class="stats"></section>
        <section class="layout">
            <div class="panel">
                <div class="section-head"><div><h2>项目画布</h2><span>跨画布查看生产进度</span></div><span id="canvasCount"></span></div>
                <div id="canvasGrid" class="canvas-grid"></div>
            </div>
            <aside class="panel">
                <div class="section-head"><div><h2>最近生成任务</h2><span>按更新时间排序</span></div><span id="taskCount"></span></div>
                <div id="taskList" class="tasks"></div>
            </aside>
            <div class="panel context-panel">
                <div class="section-head"><div><h2>项目设计约束</h2><span>Agent 执行前自动编译 Wiki、反馈素材、参考图和项目规则</span></div><span id="contextCount"></span></div>
                <div id="contextContent" class="context-grid"></div>
            </div>
            <div class="panel quality-panel">
                <div class="section-head"><div><h2>质量门与运行回放</h2><span>区分“生成完成”和“业务验收通过”</span></div><span id="qualityCount"></span></div>
                <div id="qualitySummary" class="quality-summary"></div>
            </div>
            <div class="panel preference-panel">
                <div class="section-head"><div><h2>Agent 项目偏好</h2><span>由评分、采纳、淘汰和收藏累积；Skill 候选不会自动发布</span></div><span id="preferenceCount"></span></div>
                <div id="preferenceContent" class="preference-grid"></div>
            </div>
            <div class="panel assets-panel">
                <div class="section-head"><div><h2>项目资产</h2><span>点击资产查看版本和上下游血缘</span></div><span id="assetCount"></span></div>
                <div id="assetGrid" class="asset-grid"></div>
            </div>
        </section>
    </main>
</div>

<dialog id="createDialog">
    <form id="createForm" class="dialog-body">
        <h2 id="createTitle">新建画布</h2><p id="createHint">画布会自动归入当前项目。</p>
        <label for="createName">名称</label><input id="createName" maxlength="120" required autocomplete="off">
        <div id="canvasKindField"><label for="canvasKind">画布类型</label><select id="canvasKind"><option value="smart">智能画布</option><option value="classic">经典节点画布</option></select></div>
        <div class="dialog-actions"><button id="createCancel" type="button">取消</button><button class="primary" type="submit">创建</button></div>
    </form>
</dialog>
<dialog id="lineageDialog" class="lineage-dialog">
    <div class="dialog-body">
        <div class="section-head"><div><h2 id="lineageTitle">资产血缘</h2><span id="lineageId"></span></div><button id="lineageClose" class="icon-btn" type="button">×</button></div>
        <div id="lineageContent"></div>
    </div>
</dialog>
<dialog id="replayDialog" class="replay-dialog">
    <div class="dialog-body">
        <div class="section-head"><div><h2 id="replayTitle">质量门运行回放</h2><span id="replayId"></span></div><button id="replayClose" class="icon-btn" type="button">×</button></div>
        <div id="replayContent"></div>
    </div>
</dialog>

<script>
    const $=id=>document.getElementById(id);
    const main=$('main'),projectSelect=$('projectSelect'),stats=$('stats'),canvasGrid=$('canvasGrid'),taskList=$('taskList'),assetGrid=$('assetGrid');
    const createDialog=$('createDialog'),createForm=$('createForm'),lineageDialog=$('lineageDialog'),replayDialog=$('replayDialog');
    let projects=[],activeProjectId='',workspace=null,createMode='canvas';
    const esc=value=>String(value??'').replace(/[&<>"']/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
    const time=value=>value?new Date(Number(value)<1e10?Number(value)*1000:Number(value)).toLocaleString('zh-CN',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}):'--';
    const statusLabel=value=>({queued:'排队中',running:'生成中',succeeded:'已完成',failed:'失败',cancelled:'已取消'}[value]||value||'未知');
    function canvasUrl(item){return item.kind==='smart'?`/static/smart-canvas.html?id=${encodeURIComponent(item.id)}&fit=1&v=20260724-canvas-agent-history-fix`:`/static/canvas.html?id=${encodeURIComponent(item.id)}`}
    function openCanvas(id){const item=(workspace?.canvases||[]).find(canvas=>canvas.id===id);if(item) location.href=canvasUrl(item)}
    function render(){
        const data=workspace||{},counts=data.counts||{},project=data.project||{};
        $('projectName').textContent=project.name||'项目工作台';
        $('projectMeta').textContent=`${project.code||'未设置项目代码'} · 更新于 ${time(project.updated_at)}`;
        const cards=[
            [counts.canvases||0,'画布',''],[counts.assets||0,'资产版本',''],[counts.generation_tasks||0,'生成任务',''],
            [counts.feedback_events||0,'反馈事件',''],[counts.adopted_assets||0,'最终采用','success'],
            [counts.active_tasks||0,'进行中','active'],[counts.succeeded_tasks||0,'已完成','success'],[counts.attention_tasks||0,'需处理','attention']
        ];
        stats.innerHTML=cards.map(([value,label,kind])=>`<div class="stat ${kind}"><strong>${value}</strong><span>${label}</span></div>`).join('');
        const canvases=data.canvases||[];$('canvasCount').textContent=`${canvases.length} 个`;
        canvasGrid.innerHTML=canvases.length?canvases.map(item=>`<button class="canvas-card" type="button" data-canvas="${esc(item.id)}"><span class="canvas-icon">${item.kind==='smart'?'✦':'◇'}</span><span class="canvas-kind">${item.kind==='smart'?'智能画布':'经典画布'}</span><h3>${esc(item.title)}</h3><p>${time(item.updated_at)}</p><span class="canvas-metrics"><span>${item.snapshot_count||0} 个快照</span><span>${item.task_count||0} 个任务</span><span>${item.succeeded_count||0} 个结果</span></span></button>`).join(''):'<div class="empty">当前项目还没有画布，点击“新建画布”开始。</div>';
        canvasGrid.querySelectorAll('[data-canvas]').forEach(button=>button.onclick=()=>openCanvas(button.dataset.canvas));
        const tasks=data.recent_tasks||[];$('taskCount').textContent=`${tasks.length} 项`;
        taskList.innerHTML=tasks.length?tasks.map(item=>`<article class="task"><div class="task-head"><span class="status ${esc(item.status)}">${esc(statusLabel(item.status))}</span><time>${time(item.updated_at)}</time></div><p>${esc(item.prompt||'未记录提示词')}</p><small>${esc(item.canvas_title||'项目级任务')} · ${esc(item.provider_id||'provider')} · ${esc(item.model||'model')} · 输出 ${item.output_count||0} · 第 ${item.attempt||1} 轮</small>${item.context_compilation?`<div><span class="quality-chip passed">已采用 ${item.context_compilation.constraints?.length||0} 条项目约束</span></div>`:''}${item.quality?`<div><span class="quality-chip ${esc(item.quality.status)}">${item.quality.status==='passed'?'质量门通过':item.quality.status==='failed'?'质量门未通过':'评审异常'} · ${item.quality.overall_score||0}</span></div><button type="button" data-task-replay="${esc(item.id)}">查看运行回放</button>`:''}${item.canvas_id?`<button type="button" data-task-canvas="${esc(item.canvas_id)}">打开画布</button>`:''}</article>`).join(''):'<div class="empty">还没有生成任务。</div>';
        taskList.querySelectorAll('[data-task-canvas]').forEach(button=>button.onclick=()=>openCanvas(button.dataset.taskCanvas));
        taskList.querySelectorAll('[data-task-replay]').forEach(button=>button.onclick=()=>showReplay(button.dataset.taskReplay));
        const compilations=data.context_compilations||[],compiled=compilations[0]||{};$('contextCount').textContent=`${counts.context_compilations||0} 次编译`;
        const constraints=compiled.constraints||[],sources=compiled.sources||[],references=compiled.reference_assets||[];
        $('contextContent').innerHTML=compiled.id?`<article class="context-card"><h3>最近一次采用的约束</h3><p>${time(compiled.created_at)} · ${esc(compiled.goal||'未记录任务目标')} · 已关联 ${compiled.task_count||0} 个生成任务</p><div class="constraint-list">${constraints.slice(0,8).map(item=>`<div class="constraint ${item.polarity==='negative'?'negative':''}"><em>${item.polarity==='negative'?'避免':'遵守'}</em><span>${esc(item.text)}</span></div>`).join('')}</div></article><article class="context-card"><h3>证据来源</h3><p>快照 ${esc((compiled.digest||'').slice(0,12))} · ${sources.length} 个来源 · ${references.length} 张视觉参考</p><div class="context-sources">${sources.slice(0,12).map(item=>`<span>${esc(item.type||'source')} · ${esc(item.title||item.id||item.asset_id||'依据')}</span>`).join('')||'<span>只有当前任务目标</span>'}</div>${references.length?`<div class="context-references">${references.slice(0,4).map(item=>`<img src="${esc(item.url)}" alt="${esc(item.title||'项目参考图')}" title="${esc(item.reason||'')}">`).join('')}</div>`:''}</article>`:'<div class="empty">Agent 首次执行后，会在这里留下本次实际采用的项目约束快照。</div>';
        const quality=data.quality_summary||{};$('qualityCount').textContent=`${quality.evaluation_count||0} 次评审`;
        $('qualitySummary').innerHTML=[
            [quality.first_hit_rate||0,'一次命中率'],
            [quality.average_attempts||0,'平均迭代轮数'],
            [quality.passed_runs||0,'已通过任务'],
            [quality.failed_runs||0,'尚未通过任务']
        ].map(([value,label],index)=>`<div class="quality-metric"><strong>${index===0?`${Number(value)||0}%`:value}</strong><span>${label}</span></div>`).join('');
        const assets=data.recent_assets||[];$('assetCount').textContent=`${counts.assets||0} 项`;
        assetGrid.innerHTML=assets.length?assets.map(item=>`<button class="asset-card" type="button" data-asset="${esc(item.id)}"><span class="asset-thumb">${item.kind==='image'&&item.storage_url?`<img src="${esc(item.storage_url)}" alt="">`:`<span class="asset-file">${item.kind==='presentation'?'PPTX':'FILE'}</span>`}</span><span class="asset-copy"><strong>${esc(item.title||'未命名资产')}</strong><span class="asset-meta"><span>${item.feedback?.adopted?'✓ 已采用':esc(item.source||'asset')}</span><span>质量 ${item.feedback?.score||0} · ${item.feedback?.event_count||0} 次</span></span></span></button>`).join(''):'<div class="empty">生成或导入图片后，项目资产会出现在这里。</div>';
        assetGrid.querySelectorAll('[data-asset]').forEach(button=>button.onclick=()=>showLineage(button.dataset.asset));
        const profile=data.preference_profile||{},candidates=data.skill_candidates||[];$('preferenceCount').textContent=`${profile.explicit_signal_count||0} 个显式信号`;
        const preferred=profile.preferred_terms||[],avoided=profile.avoided_terms||[];
        $('preferenceContent').innerHTML=`<article class="preference-card"><h3>当前偏好画像</h3><p>已采纳 ${profile.adopted_assets||0} · 已评分 ${profile.rated_assets||0} · 已淘汰 ${profile.rejected_assets||0} · 平均 ${profile.average_rating||0} 分</p><p>优先</p><div class="preference-tags">${preferred.length?preferred.map(item=>`<span>${esc(item)}</span>`).join(''):'<span>暂无稳定偏好</span>'}</div><p>降低或避免</p><div class="preference-tags">${avoided.length?avoided.map(item=>`<span>${esc(item)}</span>`).join(''):'<span>暂无负向信号</span>'}</div></article><article class="preference-card"><h3>Skill 候选</h3>${candidates.length?candidates.map(item=>`<div><strong>${esc(item.title)}</strong><p>状态：${esc(item.status)} · 只存候选，未发布</p><div class="candidate-actions"><button data-candidate="${esc(item.id)}" data-status="accepted">接受候选</button><button data-candidate="${esc(item.id)}" data-status="rejected">拒绝</button></div></div>`).join(''):'<p>至少需要 2 个显式偏好信号才会生成候选。</p>'}</article>`;
        $('preferenceContent').querySelectorAll('[data-candidate]').forEach(button=>button.onclick=()=>reviewCandidate(button.dataset.candidate,button.dataset.status));
    }

    async function showReplay(taskId){
        replayDialog.showModal();$('replayTitle').textContent='正在读取运行回放…';$('replayId').textContent=taskId;$('replayContent').innerHTML='<div class="empty">正在加载…</div>';
        const response=await fetch(`/api/generation-tasks/${encodeURIComponent(taskId)}/replay`,{cache:'no-store'});
        const replay=await response.json();
        if(!response.ok){$('replayContent').innerHTML=`<div class="empty">${esc(replay.detail||'回放加载失败')}</div>`;return}
        $('replayTitle').textContent='质量门运行回放';$('replayId').textContent=`根任务 ${replay.root_task_id||taskId}`;
        const links=new Map((replay.retry_links||[]).map(item=>[item.child_task_id,item]));
        $('replayContent').innerHTML=(replay.attempts||[]).map((attempt,index)=>{
            const evaluations=attempt.quality_evaluations||[],evaluation=evaluations[evaluations.length-1],link=links.get(attempt.id);
            const scores=evaluation?.scores||[];
            return `<article class="replay-attempt"><div class="task-head"><h3>第 ${attempt.attempt||index+1} 轮 · ${esc(statusLabel(attempt.status))}</h3><time>${time(attempt.updated_at)}</time></div>${link?`<p><strong>上一轮反馈：</strong>${esc(link.feedback||'质量门未通过')}</p>`:''}<p>${esc(attempt.prompt||'未记录提示词')}</p>${evaluation?`<span class="quality-chip ${esc(evaluation.status)}">${evaluation.status==='passed'?'通过':'未通过'} · ${evaluation.overall_score||0}/${evaluation.pass_threshold||75}</span><p><strong>评审结论：</strong>${esc(evaluation.verdict||'')}</p><p><strong>下一轮建议：</strong>${esc(evaluation.feedback||'暂无')}</p>${scores.map(item=>`<div class="replay-score"><strong>${item.score||0}</strong><span>${esc(item.title||item.requirement_id)}：${esc(item.reason||'未提供理由')}</span></div>`).join('')}`:'<p>本轮还没有质量评审。</p>'}</article>`;
        }).join('')||'<div class="empty">暂无可回放的运行记录。</div>';
    }

    async function reviewCandidate(candidateId,status){
        const response=await fetch(`/api/projects/${encodeURIComponent(activeProjectId)}/skill-candidates/${encodeURIComponent(candidateId)}/review`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({status})});
        if(!response.ok)return alert('Skill 候选审核失败');await loadWorkspace();
    }
    async function loadProjects(){
        const response=await fetch('/api/projects',{cache:'no-store'});if(!response.ok)throw new Error('项目加载失败');
        projects=(await response.json()).projects||[];
        const requested=new URLSearchParams(location.search).get('project_id')||localStorage.getItem('studio_active_project_id')||'';
        activeProjectId=projects.some(item=>item.id===requested)?requested:(projects[0]?.id||'');
        projectSelect.innerHTML=projects.map(item=>`<option value="${esc(item.id)}">${esc(item.name)}</option>`).join('');
        projectSelect.value=activeProjectId;
    }
    async function loadWorkspace(){
        if(!activeProjectId)return;main.classList.add('loading');
        try{
            const response=await fetch(`/api/projects/${encodeURIComponent(activeProjectId)}/workspace?limit=30`,{cache:'no-store'});
            if(!response.ok)throw new Error('项目数据加载失败');workspace=await response.json();render();
        }finally{main.classList.remove('loading')}
    }
    function openCreate(mode){
        createMode=mode;$('createTitle').textContent=mode==='project'?'新建项目':'新建画布';
        $('createHint').textContent=mode==='project'?'创建后会自动切换到新项目。':'画布会自动归入当前项目。';
        $('canvasKindField').hidden=mode==='project';$('createName').value='';createDialog.showModal();setTimeout(()=>$('createName').focus(),30);
    }
    createForm.onsubmit=async event=>{
        event.preventDefault();const name=$('createName').value.trim();if(!name)return;
        const isProject=createMode==='project',url=isProject?'/api/projects':'/api/canvases';
        const payload=isProject?{name}:{title:name,kind:$('canvasKind').value,icon:$('canvasKind').value==='smart'?'sparkles':'layers',project_id:activeProjectId};
        const response=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
        const data=await response.json().catch(()=>({}));if(!response.ok){alert(data.detail||'创建失败');return}
        createDialog.close();
        if(isProject){activeProjectId=data.project.id;localStorage.setItem('studio_active_project_id',activeProjectId);await loadProjects();await loadWorkspace()}
        else location.href=canvasUrl(data.canvas);
    };
    async function showLineage(assetId){
        lineageDialog.showModal();$('lineageTitle').textContent='正在读取资产血缘…';$('lineageId').textContent=assetId;$('lineageContent').innerHTML='<div class="empty">正在加载…</div>';
        const response=await fetch(`/api/assets/${encodeURIComponent(assetId)}/lineage`,{cache:'no-store'});const data=await response.json();
        const asset=data.asset||{},versions=data.versions||[],up=data.upstream||[],down=data.downstream||[],feedback=data.feedback||{},image=versions[0]?.storage_url||'';
        $('lineageTitle').textContent=asset.title||'项目资产';
        const nodes=(items,direction)=>items.length?items.map(item=>`<div class="lineage-node">${esc(item.title||(direction==='up'?'上游输入':'后续结果'))}<br><small>${esc(direction==='up'?item.from_asset_id:item.to_asset_id)}</small></div>`).join(''):'<div class="lineage-node">暂无</div>';
        $('lineageContent').innerHTML=`<div class="lineage-preview">${image?`<img src="${esc(image)}" alt="">`:'<div class="empty">暂无预览</div>'}<div><div class="lineage-columns"><section class="lineage-column"><h3>上游输入 · ${up.length}</h3>${nodes(up,'up')}</section><section class="lineage-column lineage-current"><h3>当前资产 · ${versions.length} 个版本</h3><div class="lineage-node">${esc(asset.id||assetId)}</div><div class="lineage-node">反馈 ${feedback.event_count||0} · 质量 ${feedback.score||0}</div>${versions.map((item,index)=>`<div class="lineage-node">版本 ${versions.length-index}<br><small>${esc(item.storage_url||'')}</small></div>`).join('')}</section><section class="lineage-column"><h3>后续分支 · ${down.length}</h3>${nodes(down,'down')}</section></div><button id="adoptAssetBtn" class="primary" type="button" style="margin-top:12px">${feedback.adopted?'取消最终采用':'标记为最终采用'}</button></div></div>`;
        $('adoptAssetBtn').onclick=async()=>{
            const response=await fetch(`/api/assets/${encodeURIComponent(assetId)}/feedback`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({project_id:activeProjectId,event_type:feedback.adopted?'final_unadopted':'final_adopted',context:{source:'project_workbench'}})});
            if(!response.ok)return alert('记录采用状态失败');await loadWorkspace();await showLineage(assetId);
        };
    }
    projectSelect.onchange=async event=>{activeProjectId=event.target.value;localStorage.setItem('studio_active_project_id',activeProjectId);history.replaceState(null,'',`?project_id=${encodeURIComponent(activeProjectId)}`);await loadWorkspace()};
    $('refreshBtn').onclick=loadWorkspace;$('pptWorkbenchBtn').onclick=()=>location.href=`/static/ppt-workbench.html?project_id=${encodeURIComponent(activeProjectId)}`;$('newProjectBtn').onclick=()=>openCreate('project');$('newCanvasBtn').onclick=()=>openCreate('canvas');
    $('createCancel').onclick=()=>createDialog.close();$('lineageClose').onclick=()=>lineageDialog.close();$('replayClose').onclick=()=>replayDialog.close();
    (async()=>{try{await loadProjects();await loadWorkspace()}catch(error){main.innerHTML=`<div class="empty">${esc(error.message)}</div>`}})();
</script>
</body>
</html>

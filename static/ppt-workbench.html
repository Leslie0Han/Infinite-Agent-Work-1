<html lang="zh-CN">

    <link rel="stylesheet" href="/static/studio-shell.css?v=20260720-unified-shell">

    <style>
        :root{--ink:#15171a;--muted:#727780;--line:#d9dadd;--soft:#f1f1ef;--paper:#fff;--stage:#d6d7d8;--accent:#d84b42;--success:#20795a;--warning:#ae6d16;--blue:#2f669f;--shadow:0 18px 48px rgba(18,20,24,.15)}

        button,input,select,textarea{font:inherit}button{cursor:pointer}.app{height:calc(100vh - 48px);display:grid;grid-template-rows:60px minmax(0,1fr);background:#f7f7f5}.app.busy{cursor:progress}.app.busy button{pointer-events:none;opacity:.62}
        .toolbar{display:grid;grid-template-columns:240px 1fr 430px;align-items:center;border-bottom:1px solid var(--line);background:rgba(255,255,255,.97);position:relative;z-index:5}.tool-brand{height:100%;padding:0 18px;display:flex;align-items:center;gap:10px;border-right:1px solid var(--line)}.tool-mark{width:30px;height:30px;display:grid;place-items:center;color:#fff;background:#17191c;font-weight:900}.tool-brand strong{display:block;font-size:12px}.tool-brand small{display:block;color:var(--muted);font-size:9px;letter-spacing:.08em}.mode-switch{justify-self:center;display:flex;height:38px;border:1px solid var(--line);background:#f4f4f2}.mode-button{min-width:96px;padding:0 15px;display:flex;align-items:center;justify-content:center;gap:7px;border:0;border-right:1px solid var(--line);background:transparent;color:#686c73;font-weight:750}.mode-button:last-child{border-right:0}.mode-button.active{background:#fff;color:#111;box-shadow:inset 0 -2px var(--accent)}.mode-button svg{width:14px;height:14px}.badge{min-width:18px;height:18px;padding:0 5px;display:inline-grid;place-items:center;color:#fff;background:var(--accent);border-radius:999px;font-size:9px}
        .toolbar-actions{height:100%;padding:0 14px;display:flex;align-items:center;justify-content:flex-end;gap:7px;border-left:1px solid var(--line)}.button,.icon-button{height:34px;padding:0 12px;display:inline-flex;align-items:center;justify-content:center;gap:7px;border:1px solid #cfd0d2;background:#fff;color:#1c1e22;text-decoration:none;font-weight:720}.button.primary{color:#fff;background:#17191c;border-color:#17191c}.button:disabled{cursor:not-allowed;opacity:.45}.button svg,.icon-button svg{width:14px;height:14px}.icon-button{width:34px;padding:0}.hidden{display:none!important}
        .workspace{min-height:0;display:grid;grid-template-columns:240px minmax(560px,1fr) 390px}.outline,.inspector{min-height:0;overflow:auto;background:#f7f7f5}.outline{border-right:1px solid var(--line)}.inspector{border-left:1px solid var(--line);background:#fbfbfa}.pane-head{padding:13px 14px 11px;border-bottom:1px solid var(--line);position:sticky;top:0;background:#f7f7f5;z-index:2}.pane-title{display:flex;align-items:center;justify-content:space-between;gap:10px}.pane-title strong{font-size:12px}.pane-title span{color:var(--muted);font-size:9px;font-weight:750;letter-spacing:.06em}.filter-row{display:flex;gap:4px;margin-top:10px;overflow:auto}.filter-chip{height:24px;padding:0 7px;border:1px solid transparent;background:#ececea;color:#71757c;font-size:8px;font-weight:750;white-space:nowrap}.filter-chip.active{border-color:#25272b;background:#fff;color:#181a1d}
        .page-list{padding:7px 7px 24px}.page-row{width:100%;min-height:58px;padding:7px;display:grid;grid-template-columns:22px 52px 1fr;gap:7px;align-items:center;border:1px solid transparent;background:transparent;text-align:left;color:inherit}.page-row:hover{background:#eeeeeb}.page-row.active{border-color:#333;background:#fff}.page-index{color:#7d8188;font:700 9px/1 ui-monospace,SFMono-Regular,Menlo,monospace}.page-thumb{position:relative;width:52px;aspect-ratio:16/9;overflow:hidden;border:1px solid #c8c9cb;background:#fff}.page-thumb img{width:100%;height:100%;object-fit:cover}.page-dot{position:absolute;right:3px;bottom:3px;width:8px;height:8px;border:2px solid #fff;border-radius:50%;background:#8f949b}.page-dot.update{background:var(--warning)}.page-dot.unchanged{background:var(--success)}.page-dot.replaced{background:var(--blue)}.page-copy{min-width:0}.page-copy strong{display:block;font-size:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.page-copy small{display:block;margin-top:3px;color:var(--muted);font-size:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .stage{min-width:0;min-height:0;display:grid;grid-template-rows:54px minmax(0,1fr) 36px;background:var(--stage)}.stage-head{padding:0 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(32,34,37,.16);background:#e5e5e3}.stage-head strong{font-size:12px}.stage-head small{display:block;color:#666b72;font-size:9px}.save-state{display:flex;align-items:center;gap:6px;color:#5f6b66;font-size:9px}.save-state span{width:6px;height:6px;border-radius:50%;background:var(--success)}.canvas-wrap{min-height:0;padding:30px;display:grid;place-items:center;overflow:auto;background-color:#d9dad9;background-image:linear-gradient(rgba(0,0,0,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(0,0,0,.035) 1px,transparent 1px);background-size:48px 48px}.slide-canvas{position:relative;width:min(920px,100%);aspect-ratio:16/9;overflow:hidden;background:#fff;box-shadow:var(--shadow)}.slide-base{position:absolute;inset:0;width:100%;height:100%;object-fit:fill}.slide-empty{position:absolute;inset:0;display:grid;place-items:center;color:#858991;text-align:center}.slide-empty svg{width:34px;height:34px;margin-bottom:10px}.replacement-preview{position:absolute;display:block;object-fit:cover;z-index:2}.object-hit{position:absolute;z-index:4;border:1.5px solid rgba(216,75,66,.82);background:rgba(216,75,66,.05);padding:0}.object-hit:hover,.object-hit.active{border-width:2px;background:rgba(216,75,66,.10)}.object-hit.unchanged{border-color:var(--success);background:rgba(32,121,90,.06)}.object-hit.update{border-color:var(--warning);background:rgba(174,109,22,.08)}.object-hit.protected{border-style:dashed;border-color:#7f858c;background:rgba(100,106,114,.05)}.object-hit.replaced{border-color:var(--blue);background:rgba(47,102,159,.08)}.object-label{position:absolute;left:-1px;top:-19px;height:18px;padding:2px 5px;color:#fff;background:#222;font-size:8px;font-weight:800;white-space:nowrap}.object-hit.unchanged .object-label{background:var(--success)}.object-hit.update .object-label{background:var(--warning)}.object-hit.replaced .object-label{background:var(--blue)}.text-hit{position:absolute;z-index:3;border:1px dashed rgba(47,102,159,.65);background:rgba(47,102,159,.03);padding:0;text-align:left;overflow:hidden}.text-hit.active{border:2px solid var(--blue);background:rgba(47,102,159,.08)}.text-overlay-copy{display:block;max-width:100%;max-height:100%;overflow:hidden;padding:1px 3px;color:#202226;background:rgba(255,255,255,.88);font:600 clamp(7px,.72vw,12px)/1.18 -apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif;white-space:pre-wrap}.stage-foot{padding:0 18px;display:flex;align-items:center;justify-content:space-between;border-top:1px solid rgba(32,34,37,.12);color:#74787e;background:#dededc;font:700 9px/1 ui-monospace,SFMono-Regular,Menlo,monospace}
        .inspector-section{padding:17px;border-bottom:1px solid var(--line)}.inspector-kicker{display:flex;align-items:center;justify-content:space-between;color:var(--muted);font-size:9px}.inspector-kicker span:first-child{display:flex;align-items:center;gap:7px;color:var(--accent);font-weight:850;letter-spacing:.06em}.inspector-kicker svg{width:14px;height:14px}.inspector-section h2{margin:9px 0 5px;font-size:15px}.inspector-section p{margin:0;color:var(--muted);font-size:10px}.status-pill{display:inline-flex;align-items:center;height:22px;margin-top:10px;padding:0 8px;border:1px solid var(--line);background:#fff;font-size:8px;font-weight:800}.status-pill.unchanged{color:var(--success);border-color:#a9d0c0;background:#eef8f3}.status-pill.update{color:var(--warning);border-color:#e0c28f;background:#fff8ea}.status-pill.replaced{color:var(--blue);border-color:#a9bfd8;background:#edf4fb}.status-pill.protected{color:#666b72;background:#f1f1ef}.action-row{display:flex;gap:7px;margin-top:12px}.action-row .button{flex:1}.action-wide{width:100%;margin-top:12px}.summary-grid{margin-top:12px;display:grid;grid-template-columns:repeat(3,1fr);border:1px solid var(--line)}.summary-cell{padding:9px;border-right:1px solid var(--line)}.summary-cell:last-child{border-right:0}.summary-cell strong{display:block;font-size:16px}.summary-cell span{color:var(--muted);font-size:8px}.compare{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:12px}.compare figure{margin:0;min-width:0}.compare img{width:100%;aspect-ratio:1.35;display:block;object-fit:cover;border:1px solid var(--line);background:#eee}.compare figcaption{margin-top:4px;color:var(--muted);font-size:8px}.reason-list{margin:9px 0 0;padding:0;list-style:none}.reason-list li{margin-top:4px;color:#62676e;font-size:9px}.reason-list li:before{content:'·';margin-right:5px;color:var(--accent)}
        .asset-search{width:100%;height:34px;margin-top:11px;padding:0 10px;border:1px solid var(--line);background:#fff}.asset-grid{margin-top:9px;display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:7px}.asset-card{padding:0;overflow:hidden;border:1px solid var(--line);background:#fff;color:inherit;text-align:left}.asset-card:hover{border-color:#1c1e22}.asset-card.recommended{border-color:var(--warning)}.asset-card img{width:100%;aspect-ratio:1.18;display:block;object-fit:cover;background:#e7e7e4}.asset-card span{display:block;padding:5px 6px 0;font-size:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.asset-card small{display:block;padding:2px 6px 6px;color:var(--muted);font-size:7px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.asset-empty{grid-column:1/-1;padding:22px 10px;border:1px dashed #c8c9cb;color:var(--muted);text-align:center;font-size:9px}
        .object-list,.text-list{margin-top:10px}.object-row,.text-row{width:100%;margin-top:6px;padding:9px;display:grid;grid-template-columns:28px 1fr;gap:8px;border:1px solid var(--line);background:#fff;text-align:left;color:inherit}.object-row.active,.text-row.active{border-color:#24272b}.object-row span:first-child,.text-row span:first-child{font:750 9px/1.5 ui-monospace,SFMono-Regular,Menlo,monospace;color:var(--accent)}.object-row strong,.text-row strong{display:block;font-size:9px}.object-row small,.text-row small{display:block;margin-top:2px;color:var(--muted);font-size:8px}.text-editor{width:100%;min-height:150px;margin-top:12px;padding:10px;resize:vertical;border:1px solid var(--line);background:#fff;color:var(--ink);line-height:1.55}.text-note{margin-top:8px;padding:9px;border-left:3px solid var(--blue);background:#edf4fb;color:#536170;font-size:9px}
        .quality-hero{padding:20px;color:#fff;background:#181a1e}.quality-score{font-size:48px;font-weight:900;line-height:1}.quality-score small{font-size:11px;font-weight:600;color:#aeb2b8}.quality-hero p{margin-top:10px;color:#c5c8cd}.quality-stats{display:grid;grid-template-columns:repeat(3,1fr);margin-top:16px;border-top:1px solid #3a3d42}.quality-stats div{padding-top:12px}.quality-stats strong{display:block}.quality-stats span{color:#9da2a9;font-size:8px}.issue-list{padding:10px 14px 22px}.issue{width:100%;margin-top:8px;padding:11px;display:grid;grid-template-columns:30px 1fr;gap:8px;border:1px solid var(--line);background:#fff;color:inherit;text-align:left}.issue-index{color:var(--accent);font:750 9px/1.4 ui-monospace,SFMono-Regular,Menlo,monospace}.issue.warning .issue-index{color:var(--warning)}.issue.info .issue-index{color:var(--blue)}.issue strong{display:block;font-size:10px}.issue small{display:block;margin-top:3px;color:var(--muted);font-size:8px}.history-item{display:block;margin-top:8px;padding:10px;border:1px solid var(--line);background:#fff;color:inherit;text-decoration:none}.history-item.latest{border-color:#1b7b59;background:#f0f8f4}.history-item strong,.history-item span{display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.history-item strong{font-size:9px}.history-item span{margin-top:3px;color:var(--muted);font-size:8px}
        .setup{grid-column:1/-1;display:grid;place-items:center;padding:40px;background:#dededb}.setup-card{width:min(720px,100%);padding:36px;background:#fff;border:1px solid #cfd0d2;box-shadow:var(--shadow)}.setup-card .setup-icon{width:46px;height:46px;display:grid;place-items:center;color:#fff;background:#17191c}.setup-card h1{margin:22px 0 7px;font-size:25px}.setup-card p{color:var(--muted);max-width:560px}.setup-steps{margin:24px 0;display:grid;grid-template-columns:repeat(3,1fr);border:1px solid var(--line)}.setup-step{padding:14px;border-right:1px solid var(--line)}.setup-step:last-child{border-right:0}.setup-step strong{display:block;font-size:11px}.setup-step span{display:block;margin-top:5px;color:var(--muted);font-size:9px}.toast{position:fixed;right:24px;bottom:24px;z-index:8000;max-width:420px;padding:12px 16px;color:#fff;background:#181a1e;box-shadow:0 12px 40px rgba(0,0,0,.3);transform:translateY(20px);opacity:0;pointer-events:none;transition:.18s}.toast.show{transform:none;opacity:1}.toast.error{background:#9e302b}
        @media(max-width:1180px){.toolbar{grid-template-columns:210px 1fr 360px}.workspace{grid-template-columns:210px minmax(500px,1fr) 350px}.toolbar-actions .button span{display:none}.asset-grid{grid-template-columns:repeat(2,1fr)}}
        @media(max-width:900px){body{overflow:auto}.app{height:auto;min-height:calc(100vh - 48px)}.toolbar{grid-template-columns:1fr auto}.tool-brand{display:none}.mode-switch{justify-self:start;margin-left:12px}.workspace{grid-template-columns:180px minmax(480px,1fr)}.inspector{grid-column:1/-1;border-left:0;border-top:1px solid var(--line)}.setup{min-height:calc(100vh - 108px)}}
        :focus-visible{outline:2px solid #1769aa;outline-offset:2px}@media(prefers-reduced-motion:reduce){*{scroll-behavior:auto!important;transition:none!important}}
    </style>

<body>
<div id="app" class="app">
    <header class="toolbar">
        <div class="tool-brand"><span class="tool-mark">P</span><div><strong>建筑强排 PPT</strong><small>SMART REPLACEMENT</small></div></div>
        <nav class="mode-switch" aria-label="PPT工作模式">
            <button class="mode-button active" type="button" data-mode="images"><i data-lucide="images"></i>图片 <span id="imageBadge" class="badge">0</span></button>
            <button class="mode-button" type="button" data-mode="text"><i data-lucide="text-cursor-input"></i>文字</button>
            <button class="mode-button" type="button" data-mode="qa"><i data-lucide="scan-search"></i>校验 <span id="issueBadge" class="badge">0</span></button>
        </nav>
        <div class="toolbar-actions">
            <a id="backLink" class="icon-button" href="/static/project-workbench.html" title="返回项目工作台" aria-label="返回项目工作台"><i data-lucide="arrow-left"></i></a>
            <button id="scanBtn" class="button" type="button" disabled><i data-lucide="scan-line"></i><span>智能检查</span></button>
            <button id="uploadTemplateBtn" class="button" type="button"><i data-lucide="folder-up"></i><span>导入母版</span></button>
            <button id="nextBtn" class="button" type="button" disabled><i data-lucide="arrow-right"></i><span>下一项</span></button>
            <button id="exportBtn" class="button primary" type="button" disabled><i data-lucide="file-down"></i><span>导出 PPTX</span></button>
        </div>
    </header>
    <main id="workspace" class="workspace"></main>
</div>
<input id="templateInput" class="hidden" type="file" accept=".pptx,application/vnd.openxmlformats-officedocument.presentationml.presentation">
<input id="imageInput" class="hidden" type="file" accept="image/png,image/jpeg,image/webp">
<div id="toast" class="toast" role="status" aria-live="polite"></div>
<script>
const $=id=>document.getElementById(id);
const app=$('app'),workspace=$('workspace'),templateInput=$('templateInput'),imageInput=$('imageInput'),exportBtn=$('exportBtn'),nextBtn=$('nextBtn'),scanBtn=$('scanBtn'),toast=$('toast');
let projects=[],activeProjectId='',job=null,assets=[],mode='images',selectedSlide=0,selectedObjectId='',selectedTextId='',filter='updates',assetQuery='',busy=false,toastTimer=0;
const esc=value=>String(value??'').replace(/[&<>"']/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
const icon=name=>`<i data-lucide="${name}" aria-hidden="true"></i>`;
const time=value=>value?new Date(value).toLocaleString('zh-CN',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}):'--';
const statusCopy={update:'发现更新',recommended:'有推荐',unreviewed:'待处理',replaced:'已替换',unchanged:'已一致',protected:'已保护',kept:'保留原图',unsupported:'暂不支持'};
function refreshIcons(){window.lucide?.createIcons?.()}
function notify(message,error=false){clearTimeout(toastTimer);toast.textContent=message;toast.className=`toast show${error?' error':''}`;toastTimer=setTimeout(()=>toast.className='toast',3200)}
function setBusy(next){busy=Boolean(next);app.classList.toggle('busy',busy)}
async function api(url,options={}){const response=await fetch(url,{cache:'no-store',...options});const data=await response.json().catch(()=>({}));if(!response.ok)throw new Error(typeof data.detail==='string'?data.detail:(data.detail?.message||'操作失败'));return data}
function page(){return (job?.pages||[]).find(item=>Number(item.slide_number)===Number(selectedSlide))||(job?.pages||[])[0]||null}
function slideImages(){return (job?.image_objects||[]).filter(item=>(item.slide_numbers||[]).map(Number).includes(Number(selectedSlide)))}
function slideTexts(){return (job?.text_objects||[]).filter(item=>item.scope==='slide'&&Number(item.slide_number)===Number(selectedSlide))}
function selectedObject(){return (job?.image_objects||[]).find(item=>item.id===selectedObjectId)||slideImages()[0]||null}
function selectedText(){return (job?.text_objects||[]).find(item=>item.id===selectedTextId)||slideTexts()[0]||null}
function frame(item){const f=item?.frame||{},rot=((Number(item?.rotation_degrees||0)%360)+360)%360,x=Number(f.x_percent||0),y=Number(f.y_percent||0),w=Number(f.width_percent||0),h=Number(f.height_percent||0);return Math.round(rot)%180?{x:x+(w-h)/2,y:y+(h-w)/2,w:h,h:w}:{x,y,w,h}}
function setMode(next){mode=['images','text','qa'].includes(next)?next:'images';document.querySelectorAll('[data-mode]').forEach(button=>button.classList.toggle('active',button.dataset.mode===mode));render()}
function setupView(){workspace.innerHTML=`<section class="setup"><div class="setup-card"><span class="setup-icon">${icon('presentation')}</span><h1>快速更新一份完整的建筑 PPT</h1><p>导入母版后，系统会识别全部图片和可编辑文字。相同图片自动跳过，只把真正变化的更新版交给你确认。</p><div class="setup-steps"><div class="setup-step"><strong>01 识别全部对象</strong><span>保留全部页面与母版</span></div><div class="setup-step"><strong>02 只确认变化</strong><span>完全相同无需替换</span></div><div class="setup-step"><strong>03 编辑与导出</strong><span>图片、文字、表格均可修改</span></div></div><button class="button primary" type="button" data-action="choose-template">${icon('folder-up')}选择 PPTX 母版</button></div></section>`;workspace.querySelector('[data-action="choose-template"]').onclick=()=>templateInput.click();exportBtn.disabled=true;nextBtn.disabled=true;scanBtn.disabled=true;refreshIcons()}
function pageMatchesFilter(item){if(filter==='all')return true;const statuses=item.statuses||[];if(filter==='updates')return statuses.includes('update');if(filter==='pending')return statuses.some(value=>['recommended','unreviewed'].includes(value));if(filter==='done')return statuses.some(value=>['replaced','unchanged','kept'].includes(value));if(filter==='protected')return Number(item.protected_count||0)>0;return true}
function outlineHtml(){const pages=(job?.pages||[]).filter(pageMatchesFilter),summary=job?.recommendation_summary||{};return `<aside class="outline"><div class="pane-head"><div class="pane-title"><strong>全部页面</strong><span>${job?.source_slide_count||0} 页 · ${job?.image_objects?.filter(x=>x.scope==='slide').length||0} 张图</span></div><div class="filter-row">${[['updates','更新'],['pending','待处理'],['done','已处理'],['protected','保护'],['all','全部']].map(([id,label])=>`<button class="filter-chip${filter===id?' active':''}" data-filter="${id}">${label}</button>`).join('')}</div></div><div class="page-list">${pages.length?pages.map(item=>{const statuses=item.statuses||[],primary=statuses.includes('update')?'update':statuses.includes('replaced')?'replaced':statuses.includes('unchanged')?'unchanged':statuses[0]||'unreviewed';return `<button class="page-row${Number(item.slide_number)===Number(selectedSlide)?' active':''}" data-page="${item.slide_number}"><span class="page-index">${String(item.slide_number).padStart(2,'0')}</span><span class="page-thumb">${item.preview_url?`<img src="${esc(item.preview_url)}" alt="第 ${item.slide_number} 页">`:''}<span class="page-dot ${primary}"></span></span><span class="page-copy"><strong>第 ${item.slide_number} 页</strong><small>${item.image_count||0} 图 · ${item.text_count||0} 文字${statuses.includes('update')?' · 发现更新':''}</small></span></button>`}).join(''):`<div class="asset-empty">当前筛选下没有页面</div>`}</div></aside>`}
function stageHtml(){const current=page();if(!current)return'';const images=slideImages(),texts=slideTexts(),base=current.preview_url?`<img class="slide-base" src="${esc(current.preview_url)}" alt="原始 PPT 第 ${selectedSlide} 页">`:`<div class="slide-empty">${icon('presentation')}<br>已读取母版，当前环境未生成页面预览</div>`;const replacement=mode==='images'?images.filter(item=>item.assignment?.storage_url).map(item=>{const f=frame(item);return `<img class="replacement-preview" src="${esc(item.assignment.storage_url)}" style="left:${f.x}%;top:${f.y}%;width:${f.w}%;height:${f.h}%" alt="${esc(item.label)}">`}).join(''):'';const hits=mode==='images'?images.map(item=>{const f=frame(item),status=item.match_status||'unreviewed';return `<button class="object-hit ${status}${item.id===selectedObjectId?' active':''}" data-object="${esc(item.id)}" style="left:${f.x}%;top:${f.y}%;width:${Math.max(f.w,.8)}%;height:${Math.max(f.h,.8)}%" title="${esc(item.label)}"><span class="object-label">${esc(item.label)} · ${statusCopy[status]||status}</span></button>`}).join(''):mode==='text'?texts.map(item=>{const f=frame(item),copy=item.kind==='shape'?`<span class="text-overlay-copy">${esc(item.draft_text)}</span>`:'';return `<button class="text-hit${item.id===selectedTextId?' active':''}" data-text="${esc(item.id)}" style="left:${f.x}%;top:${f.y}%;width:${Math.max(f.w,1)}%;height:${Math.max(f.h,1)}%" title="${esc(item.draft_text)}">${copy}</button>`}).join(''):'';return `<section class="stage"><header class="stage-head"><div><small>${mode==='images'?'图片检查':mode==='text'?'文字编辑':'导出校验'} / SLIDE ${String(selectedSlide).padStart(2,'0')}</small><strong>${mode==='images'?`${images.length} 个图片对象`:mode==='text'?`${texts.length} 个可编辑文字对象`:'完整母版校验'}</strong></div><span class="save-state"><span></span>所有修改已按项目保存</span></header><div class="canvas-wrap"><article class="slide-canvas">${base}${replacement}${hits}</article></div><footer class="stage-foot"><span>${job.source_slide_count||0} PAGES · ${job.image_objects?.length||0} IMAGE OBJECTS</span><span>${esc(job.name)} · PAGE ${String(selectedSlide).padStart(2,'0')}</span></footer></section>`}
function imagePanel(){const item=selectedObject();if(!item)return `<aside class="inspector"><section class="inspector-section"><h2>当前页没有图片对象</h2><p>可切换其他页面，或进入文字模式。</p></section></aside>`;const status=item.match_status||'unreviewed',recs=item.recommendations||[],update=recs.find(x=>x.match_type==='update'),semantic=recs.filter(x=>x.match_type==='semantic'),selected=update||semantic[0],assignment=item.assignment||{};const filteredAssets=assets.filter(asset=>!assetQuery||`${asset.title} ${(asset.categories||[]).join(' ')} ${(asset.tags||[]).join(' ')}`.toLowerCase().includes(assetQuery.toLowerCase())).slice(0,36);const protectedCopy=item.protected?`<p>该对象属于${item.scope==='slide'?'装饰':'版式/母版'}内容，替换前会确认影响范围。</p>`:'';return `<aside class="inspector"><section class="inspector-section"><div class="inspector-kicker"><span>${icon(item.protected?'shield':'image')} 当前图片</span><span>SLIDE ${String(selectedSlide).padStart(2,'0')}</span></div><h2>${esc(item.label)}</h2><p>${esc(item.shape_name||item.role)} · ${item.source_fingerprint?.width||0}×${item.source_fingerprint?.height||0}${(item.slide_numbers||[]).length>1?` · 影响 ${item.slide_numbers.length} 页`:''}</p><span class="status-pill ${status}">${statusCopy[status]||status}</span>${status==='unchanged'?`<div class="text-note">资源库中已有完全相同的图片，系统不会重复替换。</div>`:''}${protectedCopy}<div class="action-row"><button class="button primary" data-action="choose-image">${icon('upload')}上传新图</button><button class="button" data-action="keep-original">${icon('undo-2')}${assignment.storage_url?'恢复原图':'保留原图'}</button></div></section>${selected?`<section class="inspector-section"><div class="inspector-kicker"><span>${icon(selected.match_type==='update'?'git-compare':'sparkles')} ${selected.match_type==='update'?'疑似更新版':'推荐替换'}</span><span>${Math.round(Number(selected.score||0)*100)}%</span></div><div class="compare"><figure><img src="${esc(item.source_preview_url)}" alt="PPT 原图"><figcaption>PPT 当前图片</figcaption></figure><figure><img src="${esc(selected.storage_url)}" alt="${esc(selected.title)}"><figcaption>${esc(selected.title)}</figcaption></figure></div><ul class="reason-list">${(selected.reasons||[]).map(reason=>`<li>${esc(reason)}</li>`).join('')}</ul><button class="button primary action-wide" data-recommend="${esc(selected.asset_id||selected.library_image_id)}">${icon('check')}${selected.match_type==='update'?'使用此更新版':'使用此推荐'}</button></section>`:''}<section class="inspector-section"><div class="inspector-kicker"><span>${icon('library')} 项目与共享素材</span><span>${assets.length} ASSETS</span></div><input id="assetSearch" class="asset-search" value="${esc(assetQuery)}" placeholder="搜索户型、鸟瞰、彩总、文件名…"><div class="asset-grid">${filteredAssets.length?filteredAssets.map(asset=>`<button class="asset-card" data-asset="${esc(asset.id)}" title="用于 ${esc(item.label)}"><img src="${esc(asset.storage_url)}" alt="${esc(asset.title)}"><span>${esc(asset.title)}</span><small>${asset.scope==='shared'?'共享库':'当前项目'} · ${asset.width||0}×${asset.height||0}</small></button>`).join(''):`<div class="asset-empty">没有匹配当前搜索的素材</div>`}</div></section><section class="inspector-section"><div class="inspector-kicker"><span>${icon('list-tree')} 当前页图片</span><span>${slideImages().length}</span></div><div class="object-list">${slideImages().map((object,index)=>`<button class="object-row${object.id===item.id?' active':''}" data-object-row="${esc(object.id)}"><span>${String(index+1).padStart(2,'0')}</span><span><strong>${esc(object.label)}</strong><small>${statusCopy[object.match_status]||object.match_status}${object.protected?' · 受保护':''}</small></span></button>`).join('')}</div></section></aside>`}
function textPanel(){const texts=slideTexts(),item=selectedText();if(!item)return `<aside class="inspector"><section class="inspector-section"><div class="inspector-kicker"><span>${icon('text-cursor-input')} 文字编辑</span><span>SLIDE ${String(selectedSlide).padStart(2,'0')}</span></div><h2>此页没有可编辑的原生文字</h2><p>图片内的文字不会执行 OCR，也不会被误改。</p></section></aside>`;return `<aside class="inspector"><section class="inspector-section"><div class="inspector-kicker"><span>${icon(item.kind==='table_cell'?'table-2':'text-cursor-input')} ${item.kind==='table_cell'?'表格单元格':'原生文本框'}</span><span>REV ${item.revision}</span></div><h2>${esc(item.shape_name||'文字对象')}</h2><p>${item.changed?'已修改，刷新页面后仍会保留':'保留原始位置、字号、颜色和段落样式'}</p><textarea id="textEditor" class="text-editor">${esc(item.draft_text)}</textarea>${item.overflow_warning?`<div class="text-note">新文字比原内容长，可能产生换行或溢出，请在校验页确认。</div>`:''}<button class="button primary action-wide" data-action="save-text">${icon('save')}保存文字修改</button></section><section class="inspector-section"><div class="inspector-kicker"><span>${icon('list')} 当前页文字</span><span>${texts.length} ITEMS</span></div><div class="text-list">${texts.map((text,index)=>`<button class="text-row${text.id===item.id?' active':''}" data-text-row="${esc(text.id)}"><span>${String(index+1).padStart(2,'0')}</span><span><strong>${esc(text.draft_text||'空文本')}</strong><small>${text.kind==='table_cell'?'表格单元格':'文本框'}${text.changed?' · 已修改':''}</small></span></button>`).join('')}</div></section></aside>`}
function qaPanel(){const q=job.quality||{},issues=q.issues||[],summary=job.recommendation_summary||{},exports=job.exports||[];return `<aside class="inspector"><section class="quality-hero"><div class="inspector-kicker"><span>${icon('scan-search')} 导出前校验</span><span>${job.source_slide_count||0} PAGES</span></div><div class="quality-score">${q.score??100}<small>/100</small></div><p>${q.error_count?'存在阻断问题，请先处理。':`可导出完整 ${job.source_slide_count||0} 页 PPTX，未修改内容保持原样。`}</p><div class="quality-stats"><div><strong>${q.error_count||0}</strong><span>阻断</span></div><div><strong>${q.warning_count||0}</strong><span>提醒</span></div><div><strong>${q.changed_text||0}</strong><span>文字修改</span></div></div></section><section class="inspector-section"><div class="inspector-kicker"><span>${icon('activity')} 处理摘要</span><span>LOCAL</span></div><div class="summary-grid"><div class="summary-cell"><strong>${summary.unchanged||0}</strong><span>无需替换</span></div><div class="summary-cell"><strong>${summary.updates||0}</strong><span>待确认更新</span></div><div class="summary-cell"><strong>${summary.replaced||0}</strong><span>已替换</span></div></div></section>${issues.length?`<div class="issue-list">${issues.map(issue=>`<button class="issue ${issue.severity}" data-issue-object="${esc(issue.object_id||'')}" data-issue-text="${esc(issue.text_object_id||'')}" data-issue-page="${Number(issue.slide_number||0)}"><span class="issue-index">${issue.slide_number?String(issue.slide_number).padStart(2,'0'):issue.severity.toUpperCase()}</span><span><strong>${esc(issue.title)}</strong><small>${esc(issue.detail)}</small></span></button>`).join('')}</div>`:`<div class="asset-empty" style="margin:14px">没有发现导出问题</div>`}${exports.length?`<section class="inspector-section"><div class="inspector-kicker"><span>${icon('history')} 历史导出</span><span>${exports.length}</span></div>${exports.slice(0,5).map((item,index)=>`<a class="history-item${index===0?' latest':''}" href="${esc(item.download_url)}"><strong>${index===0?'最新版本':'历史版本'} · ${time(item.created_at)}</strong><span>${esc(item.filename)}</span></a>`).join('')}</section>`:''}</aside>`}
function selectDefault(){if(!job)return;const update=(job.image_objects||[]).find(item=>item.match_status==='update'),first=(job.image_objects||[]).find(item=>item.scope==='slide')||(job.image_objects||[])[0];const target=update||first;if(target){selectedObjectId=target.id;selectedSlide=Number(target.slide_number||(target.slide_numbers||[])[0]||1)}else selectedSlide=Number(job.pages?.[0]?.slide_number||1);selectedTextId=(job.text_objects||[]).find(item=>Number(item.slide_number)===selectedSlide)?.id||''}
function selectNext(){if(!job)return;if(mode==='text'){const list=job.text_objects||[],index=list.findIndex(x=>x.id===selectedTextId),next=list[index+1]||list[0];if(next){selectedTextId=next.id;selectedSlide=Number(next.slide_number||1);render()}return}const list=(job.image_objects||[]).filter(item=>['update','recommended','unreviewed'].includes(item.match_status)&&!item.protected),index=list.findIndex(x=>x.id===selectedObjectId),next=list[index+1]||list[0];if(next){selectedObjectId=next.id;selectedSlide=Number(next.slide_number||(next.slide_numbers||[])[0]||1);setMode('images')}else notify('没有其他需要确认的图片')}
function bind(){workspace.querySelectorAll('[data-filter]').forEach(button=>button.onclick=()=>{filter=button.dataset.filter;render()});workspace.querySelectorAll('[data-page]').forEach(button=>button.onclick=()=>{selectedSlide=Number(button.dataset.page);selectedObjectId=slideImages()[0]?.id||'';selectedTextId=slideTexts()[0]?.id||'';render()});workspace.querySelectorAll('[data-object],[data-object-row]').forEach(button=>button.onclick=()=>{selectedObjectId=button.dataset.object||button.dataset.objectRow;render()});workspace.querySelectorAll('[data-text],[data-text-row]').forEach(button=>button.onclick=()=>{selectedTextId=button.dataset.text||button.dataset.textRow;render()});workspace.querySelector('[data-action="choose-template"]')?.addEventListener('click',()=>templateInput.click());workspace.querySelector('[data-action="choose-image"]')?.addEventListener('click',()=>imageInput.click());workspace.querySelector('[data-action="keep-original"]')?.addEventListener('click',keepOriginal);workspace.querySelector('[data-action="save-text"]')?.addEventListener('click',saveText);workspace.querySelectorAll('[data-asset]').forEach(button=>button.onclick=()=>assignAsset(button.dataset.asset));workspace.querySelectorAll('[data-recommend]').forEach(button=>button.onclick=()=>assignAsset(button.dataset.recommend));const search=$('assetSearch');if(search)search.oninput=event=>{assetQuery=event.target.value;clearTimeout(search._timer);search._timer=setTimeout(render,180)};workspace.querySelectorAll('[data-issue-object],[data-issue-text]').forEach(button=>button.onclick=()=>{const p=Number(button.dataset.issuePage||0);if(p)selectedSlide=p;if(button.dataset.issueObject){selectedObjectId=button.dataset.issueObject;setMode('images')}else if(button.dataset.issueText){selectedTextId=button.dataset.issueText;setMode('text')}})}
function render(){if(!job){setupView();return}if(!selectedSlide||!(job.pages||[]).some(item=>Number(item.slide_number)===Number(selectedSlide)))selectDefault();$('imageBadge').textContent=job.recommendation_summary?.updates||0;$('issueBadge').textContent=(job.quality?.error_count||0)+(job.quality?.warning_count||0);workspace.innerHTML=outlineHtml()+stageHtml()+(mode==='images'?imagePanel():mode==='text'?textPanel():qaPanel());bind();exportBtn.disabled=job.quality?.status!=='passed'||busy;nextBtn.disabled=busy;scanBtn.disabled=busy;exportBtn.querySelector('span').textContent=`导出完整 ${job.source_slide_count||0} 页`;refreshIcons()}
async function loadProjects(){const data=await api('/api/projects');projects=data.projects||[];const requested=new URLSearchParams(location.search).get('project_id')||localStorage.getItem('studio_active_project_id')||'';activeProjectId=projects.some(item=>item.id===requested)?requested:(projects[0]?.id||'');if(activeProjectId){localStorage.setItem('studio_active_project_id',activeProjectId);$('backLink').href=`/static/project-workbench.html?project_id=${encodeURIComponent(activeProjectId)}`}}
async function loadWorkbench(){if(!activeProjectId)return;const data=await api(`/api/projects/${encodeURIComponent(activeProjectId)}/ppt-workbench`);job=data.active_job||null;assets=data.assets||[];if(job)selectDefault();render()}
async function scan(){if(!job)return;setBusy(true);notify('正在比对 PPT 与项目素材…');try{const data=await api(`/api/projects/${encodeURIComponent(activeProjectId)}/ppt-workbench/${encodeURIComponent(job.id)}/scan`,{method:'POST'});job=data.job;assets=data.assets||assets;selectDefault();notify(`检查完成：${job.recommendation_summary?.unchanged||0} 张无需替换，${job.recommendation_summary?.updates||0} 张发现更新`)}catch(error){notify(error.message,true)}finally{setBusy(false);render()}}
async function uploadTemplate(file){if(!file)return;setBusy(true);notify('正在识别全部图片、文字和版式…');try{const body=new FormData();body.append('file',file);const data=await api(`/api/projects/${encodeURIComponent(activeProjectId)}/ppt-workbench/templates`,{method:'POST',body});job=data.job;assets=data.assets||[];selectDefault();mode='images';notify(`已读取 ${job.source_slide_count||0} 页、${job.image_objects?.length||0} 个图片对象和 ${job.text_objects?.length||0} 个文字对象`)}catch(error){notify(error.message,true)}finally{setBusy(false);templateInput.value='';render()}}
async function uploadImage(file){const item=selectedObject();if(!file||!item)return;setBusy(true);try{const body=new FormData();body.append('slot_id',item.id);body.append('file',file);const data=await api(`/api/projects/${encodeURIComponent(activeProjectId)}/ppt-workbench/${encodeURIComponent(job.id)}/images`,{method:'POST',body});job=data.job;await refresh();notify(`${item.label} 已替换并进入项目素材`)}catch(error){notify(error.message,true)}finally{setBusy(false);imageInput.value='';render()}}
async function refresh(){const data=await api(`/api/projects/${encodeURIComponent(activeProjectId)}/ppt-workbench/${encodeURIComponent(job.id)}`);job=data.job;assets=data.assets||[]}
async function assignAsset(assetId){const item=selectedObject();if(!item||!assetId)return;let apply_scope='object';if(item.protected){const pages=(item.slide_numbers||[]).join('、');if(!window.confirm(`这是受保护的${item.scope==='slide'?'装饰':'版式'}图片，替换可能影响第 ${pages} 页。确认继续？`))return;apply_scope=item.scope==='slide'?'source_group':'layout_group'}setBusy(true);try{const data=await api(`/api/projects/${encodeURIComponent(activeProjectId)}/ppt-workbench/${encodeURIComponent(job.id)}/image-objects/${encodeURIComponent(item.id)}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({asset_id:assetId,apply_scope})});job=data.job;notify(`${item.label} 已使用 ${data.asset?.title||'新素材'}`)}catch(error){notify(error.message,true)}finally{setBusy(false);render()}}
async function keepOriginal(){const item=selectedObject();if(!item)return;setBusy(true);try{const data=await api(`/api/projects/${encodeURIComponent(activeProjectId)}/ppt-workbench/${encodeURIComponent(job.id)}/image-objects/${encodeURIComponent(item.id)}/assignment?keep_original=true`,{method:'DELETE'});job=data.job;notify(`${item.label} 已保留原图`)}catch(error){notify(error.message,true)}finally{setBusy(false);render()}}
async function saveText(){const item=selectedText(),editor=$('textEditor');if(!item||!editor)return;setBusy(true);try{const data=await api(`/api/projects/${encodeURIComponent(activeProjectId)}/ppt-workbench/${encodeURIComponent(job.id)}/text-objects/${encodeURIComponent(item.id)}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:editor.value,revision:item.revision})});job=data.job;selectedTextId=item.id;notify('文字修改已保存，导出时会保留原样式')}catch(error){notify(error.message,true)}finally{setBusy(false);render()}}
async function exportPpt(){if(!job||job.quality?.status!=='passed'){setMode('qa');notify('请先处理阻断问题',true);return}setBusy(true);notify('正在原位写入图片和文字，未修改内容保持不变…');try{const data=await api(`/api/projects/${encodeURIComponent(activeProjectId)}/ppt-workbench/${encodeURIComponent(job.id)}/export`,{method:'POST'});job=data.job;notify('PPTX 已导出，页数、任务历史和素材血缘已校验');render();location.href=data.export.download_url}catch(error){notify(error.message,true);setMode('qa')}finally{setBusy(false);render()}}
document.querySelectorAll('[data-mode]').forEach(button=>button.onclick=()=>setMode(button.dataset.mode));$('uploadTemplateBtn').onclick=()=>templateInput.click();scanBtn.onclick=scan;nextBtn.onclick=selectNext;exportBtn.onclick=exportPpt;templateInput.onchange=()=>uploadTemplate(templateInput.files?.[0]);imageInput.onchange=()=>uploadImage(imageInput.files?.[0]);
window.addEventListener('studio-project-change',async event=>{const next=event.detail?.projectId;if(!next||next===activeProjectId)return;activeProjectId=next;history.replaceState(null,'',`?project_id=${encodeURIComponent(next)}`);job=null;selectedSlide=0;await loadWorkbench()});
(async()=>{try{await loadProjects();await loadWorkbench()}catch(error){notify(error.message,true);setupView()}refreshIcons()})();
</script>

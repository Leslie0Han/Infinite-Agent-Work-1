            const recentPages = (overview.recent_pages || []).slice(0, 6).map(item => renderHomeItem(item, 'page')).join('');
            body.innerHTML = `
                <div class="home-stack">
                    <section class="home-hero">
                        <div class="home-title">${escapeHtml(active.name || '知识库首页')}</div>
                        <div class="home-copy">上方接入区负责上传、导入和编译资料；下方展示来源和生成资产；右侧只用于知识库问答，回答会保存回本地知识库。</div>
                        <div class="quick-actions">
                            <button class="btn primary" type="button" data-action-focus="inbox"><i data-lucide="inbox"></i><span>导入资料</span></button>
                            <button class="btn" type="button" data-action-focus="compile"><i data-lucide="sparkles"></i><span>编译</span></button>
                            <button class="btn" type="button" data-action-focus="qa"><i data-lucide="messages-square"></i><span>提问</span></button>
                        </div>
                    </section>
                    <section class="overview-grid">
                        <div class="overview-card"><div class="overview-label">来源</div><div class="overview-value">${escapeHtml(counts.sources || 0)}</div></div>
                        <div class="overview-card"><div class="overview-label">生成页面</div><div class="overview-value">${escapeHtml(counts.pages || 0)}</div></div>
                        <div class="overview-card"><div class="overview-label">图谱节点</div><div class="overview-value">${escapeHtml(counts.graph_nodes || 0)}</div></div>
                    </section>
                    <section class="home-section">
                        <div class="home-section-head"><div class="home-section-title">最近来源</div><div class="item-meta">${escapeHtml((overview.recent_sources || []).length)} 条</div></div>
                        <div class="home-list">${recentSources || '<div class="empty">还没有来源。可以从上方资料接入区上传或导入。</div>'}</div>
                    </section>
                    <section class="home-section">
                        <div class="home-section-head"><div class="home-section-title">最近产物</div><div class="item-meta">${escapeHtml((overview.recent_pages || []).length)} 条</div></div>
                        <div class="home-list">${recentPages || '<div class="empty">编译或问答后，这里会出现摘要、概念、问答和报告。</div>'}</div>
                    </section>
                </div>
            `;
        }

        function renderLocalWorkspace() {
            const body = document.getElementById('localWorkspaceBody');
            const active = state.activeLocalWiki;
            if (!active) {
                setVaultDocumentMeta('知识库', '');
                body.innerHTML = '<div class="empty">先创建或选择一个本地知识库。</div>';
                return;
            }
            document.getElementById('topWorkspaceTitle').textContent = active.name || '本地知识库';
            document.getElementById('topWorkspacePath').textContent = active.root || '';
            renderLocalSwitcher();
            renderVaultTree();
            if (state.localTab === 'file') {
                renderVaultFileContent();
                renderActionPanel();
                refreshIcons();
                return;
            }
            renderVaultHome();
            renderActionPanel();
            refreshIcons();
        }

        async function openVaultFile(path) {
            const root = currentLocalWikiRoot();
            if (!root || !path) return;
            state.localTab = 'file';
            state.activeFilePath = path;
            state.activeDoc = null;
            renderLocalWorkspace();
            try {
                state.activeDoc = await api(`/api/local-wiki/file?root=${encodeURIComponent(root)}&path=${encodeURIComponent(path)}`);
            } catch (err) {
                showToast(err.message);
                state.localTab = 'overview';
            }
            renderLocalWorkspace();
        }

        async function refreshLocalWorkspace() {
            loadLocalWikiRegistry();
            setLocalSetupMode(!!state.activeLocalWiki);
            if (!state.activeLocalWiki?.root) {
                renderLocalWorkspace();
                return;
            }
            try {
                const root = encodeURIComponent(state.activeLocalWiki.root);
                const [overview, tree] = await Promise.all([
                    api(`/api/local-wiki/overview?root=${root}`),
                    api(`/api/local-wiki/tree?root=${root}`)
                ]);
                state.localOverview = overview;
                state.vaultTree = tree;
            } catch (err) {
                showToast(err.message);
                state.localOverview = null;
                state.vaultTree = null;
            }
            renderLocalWorkspace();
        }

        function renderLocalWikiResult(data) {
            const box = document.getElementById('localWikiResult');
            if (!data) {
                box.style.display = 'none';
                box.textContent = '';
                return;
            }
            box.style.display = 'block';
            box.innerHTML = `
                <strong>已创建：</strong>${escapeHtml(data.root)}<br>
                <strong>目录：</strong>${escapeHtml((data.created_dirs || []).length)} 个，
                <strong>文件：</strong>${escapeHtml((data.created_files || []).length)} 个<br>
                ${(data.next_steps || []).map(step => `- ${escapeHtml(step)}`).join('<br>')}
            `;
            if (data.root) {
                upsertLocalWiki(data);
                refreshLocalWorkspace().catch(err => showToast(err.message));
            }
        }

        function renderInboxResult(data) {
            const box = document.getElementById('localInboxResult');
            if (!data) {
                box.style.display = 'none';
                box.textContent = '';
                return;
            }
            const items = data.imported || [];
            const compile = data.compile || {};
            const compileErrors = (compile.results || [])
                .map(item => item.compile_meta?.llm_error || item.source?.compile_meta?.llm_error || '')
                .filter(Boolean);
            box.style.display = 'block';
            box.innerHTML = `
                <strong>已放入收件箱：</strong>${escapeHtml(data.count || items.length || 0)} 个文件<br>
                ${items.slice(0, 8).map(item => `- ${escapeHtml(item.path || item.title || '')}`).join('<br>')}
                ${items.length > 8 ? '<br>...' : ''}
                <br><strong>自动编译：</strong>${escapeHtml(compile.compiled || 0)} 个完成，${escapeHtml(compile.skipped || 0)} 个跳过
                ${compileErrors.length ? `<br><strong>API 编译提示：</strong>${escapeHtml(compileErrors[0])}` : ''}
            `;
        }

        async function initLocalWiki() {
            const baseDir = document.getElementById('localWikiBaseDir').value.trim();
            const name = document.getElementById('localWikiName').value.trim() || 'AgentWiki';
            const localOnly = false;
            if (!baseDir) {
                showToast('请先填写保存位置。');
                return;
            }
            const btn = document.getElementById('initLocalWikiBtn');
            btn.disabled = true;
            btn.innerHTML = '<i data-lucide="loader-circle"></i><span>生成中</span>';
            refreshIcons();
            try {
                const data = await api('/api/local-wiki/init', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        base_dir: baseDir,
                        name,
                        local_only: localOnly,
                        language: 'zh-CN'
                    })
                });
                renderLocalWikiResult(data);
                showToast('本地知识库结构已生成。');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i data-lucide="sparkles"></i><span>生成结构</span>';
                refreshIcons();
            }
        }

        async function chooseFolder(targetId) {
            const data = await api('/api/local-wiki/choose-folder');
            if (data.path) document.getElementById(targetId).value = data.path;
        }

        function currentLocalWikiRoot() {
            return state.activeLocalWiki?.root || '';
        }

        function currentInboxCategory() {
            return document.getElementById('localWikiInboxCategory').value || '上传文件';
        }

        async function uploadFilesToInbox(files) {
            const root = currentLocalWikiRoot();
            if (!root) {
                showToast('请先创建或选择一个知识库。');
                return;
            }
            if (!files.length) {
                showToast('请先选择要上传的文件。');
                return;
            }
            const btn = document.getElementById('uploadLocalWikiBtn');
            btn.disabled = true;
            btn.innerHTML = '<i data-lucide="loader-circle"></i><span>上传中</span>';
            refreshIcons();
            try {
                const form = new FormData();
                form.append('root', root);
                form.append('category', currentInboxCategory());
                Array.from(files).forEach(file => form.append('files', file));
                const data = await api('/api/local-wiki/upload', { method: 'POST', body: form });
                renderInboxResult(data);
                document.getElementById('localWikiFiles').value = '';
                showToast(`已放入收件箱：${data.count || 0} 个文件。`);
                await refreshLocalWorkspace();
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i data-lucide="upload"></i><span>上传并编译</span>';
                refreshIcons();
            }
        }

        async function uploadToInbox() {
            await uploadFilesToInbox(document.getElementById('localWikiFiles').files);
        }

        async function importPathToInbox() {
            const root = currentLocalWikiRoot();
            const sourcePath = document.getElementById('localWikiSourcePath').value.trim();
            if (!root) {
                showToast('请先创建或选择一个知识库。');
                return;
            }
            if (!sourcePath) {
                showToast('请先填写来源路径。');
                return;
            }
            const btn = document.getElementById('importLocalPathBtn');
            btn.disabled = true;
            btn.innerHTML = '<i data-lucide="loader-circle"></i><span>复制中</span>';
            refreshIcons();
            try {
                const data = await api('/api/local-wiki/import-path', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        root,
                        source_path: sourcePath,
                        category: currentInboxCategory(),
                        max_files: 200
                    })
                });
                renderInboxResult(data);
                showToast(`已复制到收件箱：${data.count || 0} 个文件。`);
                await refreshLocalWorkspace();
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i data-lucide="folder-input"></i><span>复制路径并编译</span>';
                refreshIcons();
            }
        }

        async function pasteSourceToInbox() {
            const root = currentLocalWikiRoot();
            if (!root) {
                showToast('请先创建或选择一个知识库。');
                return;
            }
            const title = document.getElementById('pasteSourceTitle').value.trim();
            const content = document.getElementById('pasteSourceContent').value.trim();
            if (!title || !content) {
                showToast('请填写标题和正文。');
                return;
            }
            const btn = document.getElementById('pasteSourceBtn');
            btn.disabled = true;
            btn.innerHTML = '<i data-lucide="loader-circle"></i><span>保存中</span>';
            refreshIcons();
            try {
                const safeTitle = title.replace(/[\\/:*?"<>|]/g, '_').slice(0, 80) || 'note';
                const md = `# ${title}\n\n${content}\n`;
                const file = new File([md], `${safeTitle}.md`, { type: 'text/markdown' });
                const form = new FormData();
                form.append('root', root);
                form.append('category', currentInboxCategory());
                form.append('files', file);
                const data = await api('/api/local-wiki/upload', { method: 'POST', body: form });
                renderInboxResult(data);
                document.getElementById('pasteSourceTitle').value = '';
                document.getElementById('pasteSourceContent').value = '';
                showToast('已保存到收件箱。');
                await refreshLocalWorkspace();
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i data-lucide="plus"></i><span>保存并编译</span>';
                refreshIcons();
            }
        }

        async function compileLocalWiki(force = false) {
            const root = currentLocalWikiRoot();
            if (!root) {
                showToast('请先创建或选择一个知识库。');
                return;
            }
            const btn = document.getElementById(force ? 'forceCompileLocalWikiBtn' : 'compileLocalWikiBtn');
            if (btn) {
                btn.disabled = true;
                btn.innerHTML = '<i data-lucide="loader-circle"></i><span>整理中</span>';
                refreshIcons();
            }
            try {
                const data = await api('/api/local-wiki/compile', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ root, force, use_llm: true })
                });
                const box = document.getElementById('localCompileResult');
                if (box) {
                    const errors = (data.results || [])
                        .map(item => item.compile_meta?.llm_error || item.source?.compile_meta?.llm_error || '')
                        .filter(Boolean);
                    box.style.display = 'block';
                    box.innerHTML = `
                        <strong>已完成整理：</strong>${escapeHtml(data.compiled || 0)} 个来源<br>
                        <strong>跳过：</strong>${escapeHtml(data.skipped || 0)} 个，
                        <strong>图谱：</strong>${escapeHtml(data.graph?.nodes || 0)} 节点 / ${escapeHtml(data.graph?.edges || 0)} 关系
                        ${errors.length ? `<br><strong>API 编译提示：</strong>${escapeHtml(errors[0])}` : ''}
                    `;
                }
                state.localOverview = data.overview || state.localOverview;
                try {
                    state.vaultTree = await api(`/api/local-wiki/tree?root=${encodeURIComponent(root)}`);
                } catch {}
                showToast(`整理完成：${data.compiled || 0} 个来源。`);
                renderLocalWorkspace();
            } finally {
                if (btn) {
                    btn.disabled = false;
                    btn.innerHTML = force
                        ? '<i data-lucide="refresh-cw"></i><span>重新编译</span>'
                        : '<i data-lucide="sparkles"></i><span>整理 / 编译</span>';
                    refreshIcons();
                }
            }
        }

        async function askLocalWiki() {
            const root = currentLocalWikiRoot();
            const textarea = document.getElementById('localQAQuestion');
            const question = String(textarea?.value || '').trim();
            if (!root) {
                showToast('请先创建或选择一个知识库。');
                return;
            }
            if (!question) {
                showToast('请输入问题。');
                textarea?.focus();
                return;
            }
            renderQAModelSelectors();
            if (!state.qaProvider || !state.qaModel) {
                showToast('请先在知识库问答下方选择可用的 API 接口和聊天模型。');
                return;
            }
            const btn = document.getElementById('askLocalWikiBtn');
            if (btn) {
                btn.disabled = true;
                btn.innerHTML = '<i data-lucide="loader-circle"></i><span>回答中</span>';
                refreshIcons();
            }
            try {
                const data = await api('/api/local-wiki/qa', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        root,
                        question,
                        save: true,
                        use_llm: true,
                        provider: state.qaProvider,
                        model: state.qaModel
                    })
                });
                data.question = question;
                state.localQAResult = data;
                state.localOverview = data.overview || state.localOverview;
                showToast(data.meta?.llm_error ? 'API 调用失败，已保存本次记录。' : '模型回答已保存。');
                renderLocalWorkspace();
                const nextTextarea = document.getElementById('localQAQuestion');
                if (nextTextarea) nextTextarea.value = question;
            } finally {
                if (btn) {
                    btn.disabled = false;
                    btn.innerHTML = '<i data-lucide="send"></i><span>提问并保存</span>';
                    refreshIcons();
                }
            }
        }

        function applyTheme(theme) {
            document.documentElement.classList.toggle('theme-dark', theme === 'dark');
            document.documentElement.classList.toggle('studio-theme-dark', theme === 'dark');
        }

        function currentTheme() {
            return (window.StudioTheme && window.StudioTheme.get()) || localStorage.getItem('studio_theme') || 'dark';
        }

        function metric(label, value) {
            return `<div class="metric"><div class="metric-k">${escapeHtml(label)}</div><div class="metric-v">${escapeHtml(value || 0)}</div></div>`;
        }

        document.getElementById('initLocalWikiBtn').addEventListener('click', () => initLocalWiki().catch(err => showToast(err.message)));
        document.getElementById('uploadLocalWikiBtn').addEventListener('click', () => uploadToInbox().catch(err => showToast(err.message)));
        document.getElementById('importLocalPathBtn').addEventListener('click', () => importPathToInbox().catch(err => showToast(err.message)));
        document.getElementById('pasteSourceBtn').addEventListener('click', () => pasteSourceToInbox().catch(err => showToast(err.message)));
        document.getElementById('chooseLocalWikiBaseBtn').addEventListener('click', () => chooseFolder('localWikiBaseDir').catch(err => showToast(err.message)));
        document.getElementById('chooseLocalSourceBtn').addEventListener('click', () => chooseFolder('localWikiSourcePath').catch(err => showToast(err.message)));
        document.getElementById('refreshLocalWikiBtn').addEventListener('click', () => refreshLocalWorkspace().catch(err => showToast(err.message)));
        document.getElementById('vaultRefreshBtn').addEventListener('click', () => refreshLocalWorkspace().catch(err => showToast(err.message)));
        document.getElementById('vaultInboxBtn').addEventListener('click', () => {
            state.localTab = 'overview';
            state.activeFilePath = '';
            state.activeDoc = null;
            renderLocalWorkspace();
            showInboxTools();
        });
        document.getElementById('vaultCompileBtn').addEventListener('click', () => {
            state.localTab = 'overview';
            state.activeFilePath = '';
            state.activeDoc = null;
            renderLocalWorkspace();
            compileLocalWiki(false).catch(err => showToast(err.message));
        });
        document.getElementById('vaultTree').addEventListener('click', event => {
            const node = event.target.closest('[data-vault-file], [data-vault-dir], [data-vault-home]');
            if (!node) return;
            if (node.hasAttribute('data-vault-home')) {
                state.localTab = 'overview';
                state.activeFilePath = '';
                state.activeDoc = null;
                renderLocalWorkspace();
                return;
            }
            const filePath = node.dataset.vaultFile;
            if (filePath) {
                openVaultFile(filePath).catch(err => showToast(err.message));
                return;
            }
            const dirPath = node.dataset.vaultDir;
            if (dirPath) {
                if (state.expandedDirs.has(dirPath)) state.expandedDirs.delete(dirPath);
                else state.expandedDirs.add(dirPath);
                if (dirPath === '00_收件箱') {
                    state.localTab = 'overview';
                    state.activeFilePath = '';
                    state.activeDoc = null;
                    setTimeout(showInboxTools, 0);
                }
                renderLocalWorkspace();
            }
        });
        document.getElementById('newLocalWikiBtn').addEventListener('click', () => {
            state.activeLocalWiki = null;
            state.localOverview = null;
            state.vaultTree = null;
            state.localTab = 'overview';
            state.activeFilePath = '';
            state.activeDoc = null;
            localStorage.removeItem(ACTIVE_LOCAL_WIKI_KEY);
            setLocalSetupMode(false);
            document.getElementById('localWikiBaseDir').focus();
            renderLocalWorkspace();
        });
        document.getElementById('localWikiSwitcher').addEventListener('change', event => {
            const root = event.target.value;
            state.activeLocalWiki = state.localWikis.find(item => item.root === root) || null;
            state.localTab = 'overview';
            state.activeFilePath = '';
            state.activeDoc = null;
            saveLocalWikiRegistry();
            refreshLocalWorkspace().catch(err => showToast(err.message));
        });
        document.querySelectorAll('.local-tab').forEach(btn => {
            btn.addEventListener('click', () => {
                state.localTab = btn.dataset.localTab || 'overview';
                renderLocalWorkspace();
            });
        });
        const dropzone = document.getElementById('localWikiDropzone');
        dropzone.addEventListener('dragover', event => {
            event.preventDefault();
            dropzone.classList.add('dragging');
        });
        dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragging'));
        dropzone.addEventListener('drop', event => {
            event.preventDefault();
            dropzone.classList.remove('dragging');
            const files = event.dataTransfer?.files || [];
            uploadFilesToInbox(files).catch(err => showToast(err.message));
        });
        document.getElementById('localQAProviderSelect')?.addEventListener('change', event => {
            state.qaProvider = event.target.value;
            const provider = selectedQAProvider();
            state.qaModel = uniqueModels(provider?.chat_models || [])[0] || '';
            renderQAModelSelectors();
        });
        document.getElementById('localQAModelSelect')?.addEventListener('change', event => {
            state.qaModel = event.target.value;
            localStorage.setItem('local_wiki_qa_model', state.qaModel || '');
            renderQAModelSelectors();
        });
        document.getElementById('localQAModelSelect')?.addEventListener('input', event => {
            state.qaModel = event.target.value;
            localStorage.setItem('local_wiki_qa_model', state.qaModel || '');
        });
        document.addEventListener('click', event => {
            const target = event.target.closest('button');
            if (!target) return;
            if (target.dataset.openPath) {
                openVaultFile(target.dataset.openPath).catch(err => showToast(err.message));
                return;
            }
            if (target.dataset.actionFocus) {
                focusAction(target.dataset.actionFocus);
                return;
            }
            if (target.id === 'compileLocalWikiBtn') compileLocalWiki(false).catch(err => showToast(err.message));
            if (target.id === 'forceCompileLocalWikiBtn') compileLocalWiki(true).catch(err => showToast(err.message));
            if (target.id === 'askLocalWikiBtn') askLocalWiki().catch(err => showToast(err.message));
        });

        window.addEventListener('message', event => {
            const data = event.data || {};
            if (data.type === 'studio-theme') applyTheme(data.theme);
            if (data.type === 'providers-changed') loadQAModelConfig().catch(err => showToast(err.message));
        });
        window.addEventListener('studio-theme-change', event => applyTheme(event.detail?.theme || 'dark'));
        window.addEventListener('focus', () => loadQAModelConfig().catch(err => showToast(err.message)));
        window.addEventListener('pageshow', () => loadQAModelConfig().catch(err => showToast(err.message)));
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden) loadQAModelConfig().catch(err => showToast(err.message));
        });
        window.addEventListener('storage', event => {
            if (event.key === 'studio_api_providers_changed_at') loadQAModelConfig().catch(err => showToast(err.message));
        });
        try {
            const apiChannel = new BroadcastChannel('studio-api');
            apiChannel.onmessage = event => {
                if (event.data?.type === 'providers-changed') loadQAModelConfig().catch(err => showToast(err.message));
            };
        } catch {}
        setInterval(() => {
            const changedAt = localStorage.getItem('studio_api_providers_changed_at') || '';
            if (changedAt && changedAt !== state.apiProvidersChangedAt) {
                state.apiProvidersChangedAt = changedAt;
                loadQAModelConfig().catch(err => showToast(err.message));
            }
        }, 2500);

        document.addEventListener('DOMContentLoaded', () => {
            applyTheme(currentTheme());
            refreshIcons();
            loadQAModelConfig().catch(err => showToast(err.message));
            refreshLocalWorkspace().catch(err => showToast(err.message));
        }, { once: true });
    </script>
</body>
</html>
